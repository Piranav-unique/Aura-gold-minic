name: Backend CI/CD

on:
  push:
    branches: [ main, develop, dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop, dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  POSTGRES_SERVER: localhost
  POSTGRES_PORT: 5432
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: password123
  POSTGRES_DB: ags_gold_test_db
  DATABASE_URL: postgresql+asyncpg://postgres:password123@localhost:5432/ags_gold_test_db
  PYTHONPATH: backend

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Lint
        run: ruff check backend/

      - name: Run Ruff Format Check
        run: ruff format --check backend/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ags_gold_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Unit & API Tests
        run: |
          cd backend
          pytest tests/unit/ tests/api/ -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ags_gold_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Integration Tests
        run: |
          cd backend
          pytest tests/integration/ -v --tb=short

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ags_gold_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Security Tests
        run: |
          cd backend
          pytest tests/security/ -v -m security --tb=short

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [integration-tests, security-tests]
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ags_gold_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run E2E Tests
        run: |
          cd backend
          pytest tests/e2e/ -v -m e2e --tb=short

  coverage:
    name: Coverage Report & Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, e2e-tests]
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ags_gold_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run All Tests with Coverage
        run: |
          cd backend
          pytest tests/unit/ tests/api/ tests/integration/ tests/security/ tests/e2e/ \
            --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html \
            --cov-config=.coveragerc -v --tb=short

      - name: Display Coverage Summary
        run: |
          cd backend
          echo "=== Test Coverage Summary ===" 
          tail -20 htmlcov/index.html | grep -o 'Total.*%' || echo "Coverage report generated"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          if-no-files-found: ignore

      - name: Upload Coverage XML for Analysis
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore

  build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ags-gold-backend:latest

  smoke-tests:
    name: Smoke Tests & Health Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start Database
        working-directory: backend
        run: docker compose up -d db

      - name: Wait for Database
        run: |
          for i in {1..30}; do
            docker exec ags-gold-db pg_isready -U postgres -d ags_gold_db && exit 0
            sleep 2
          done
          exit 1

      - name: Migrate and Seed
        working-directory: backend
        env:
          PYTHONPATH: .
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5435
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_db
          DATABASE_URL: postgresql+asyncpg://postgres:password123@localhost:5435/ags_gold_db
        run: |
          python -m alembic upgrade head
          python -c "import asyncio; from app.database.seed import seed_data; from app.database.session import get_async_engine; engine = get_async_engine(); asyncio.run(seed_data(engine))" 2>/dev/null || python -m app.database.seed

      - name: Start API Container
        working-directory: backend
        run: docker compose up -d api

      - name: Wait for API Health
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && exit 0
            sleep 3
          done
          echo "API health check failed. Here are the logs:"
          docker compose -f backend/docker-compose.yml logs api
          exit 1

      - name: Run Smoke Tests
        working-directory: backend
        env:
          RUN_SMOKE_TESTS: "true"
          SMOKE_BASE_URL: http://localhost:8000
          SMOKE_ADMIN_EMAIL: superadmin@agsgold.com
          SMOKE_ADMIN_PASSWORD: adminpassword
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://postgres:password123@localhost:5435/ags_gold_db
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: 5435
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ags_gold_db
        run: |
          pytest tests/smoke/ -v -m smoke --tb=short

      - name: Tear Down
        if: always()
        working-directory: backend
        run: docker compose down -v

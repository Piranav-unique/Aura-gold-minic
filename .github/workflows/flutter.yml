name: Flutter CI/CD

on:
  push:
    branches: [ main, develop, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [ main, develop, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter.yml'

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Flutter Analyze
        run: |
          cd frontend
          flutter analyze

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Unit Tests
        run: |
          cd frontend
          flutter test test/unit/ --coverage

      - name: Check Unit Test Coverage
        run: |
          cd frontend
          python -c "
          import re
          from pathlib import Path
          data = Path('coverage/lcov.info').read_text()
          hits = lines = 0
          include = False
          for line in data.splitlines():
              if line.startswith('SF:'):
                  path = line[3:]
                  include = path.replace('\\\\', '/').startswith('lib/')
              elif include and line.startswith('LF:'):
                  lines += int(line.split(':', 1)[1])
              elif include and line.startswith('LH:'):
                  hits += int(line.split(':', 1)[1])
          pct = (hits / lines * 100) if lines else 0
          print(f'Full lib line coverage: {pct:.1f}% ({hits}/{lines})')
          assert pct >= 80, f'Coverage {pct:.1f}% is below 80% threshold'
          "

  widget-tests:
    name: Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Widget Tests
        run: |
          cd frontend
          flutter test test/widget/

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Integration Tests
        run: |
          cd frontend
          flutter test test/integration/

      - name: Run E2E Tests
        run: |
          cd frontend
          flutter test test/e2e/

      - name: Run Security Tests
        run: |
          cd frontend
          flutter test test/security/

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build APK (Release)
        run: |
          cd frontend
          flutter build apk --release --dart-define=ENV=prod

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build Web (Release)
        run: |
          cd frontend
          flutter build web --release --dart-define=ENV=prod

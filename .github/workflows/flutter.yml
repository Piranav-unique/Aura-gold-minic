name: Flutter CI/CD

on:
  push:
    branches: [ main, develop, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [ main, develop, dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter.yml'

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Flutter Analyze
        run: |
          cd frontend
          flutter analyze

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Unit Tests
        run: |
          cd frontend
          flutter test test/unit/

  widget-tests:
    name: Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Widget Tests
        run: |
          cd frontend
          flutter test test/widget/

  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, widget-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Run Integration Tests
        run: |
          cd frontend
          flutter test test/integration/

      - name: Run E2E Tests
        run: |
          cd frontend
          flutter test test/e2e/

      - name: Run Security Tests
        run: |
          cd frontend
          flutter test test/security/

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build APK (Release)
        run: |
          cd frontend
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

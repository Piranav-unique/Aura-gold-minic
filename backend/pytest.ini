[pytest]
pythonpath = .
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    security: Security and authorization tests
    e2e: End-to-end flow tests
    smoke: Deployment smoke and health checks

name: ags_gold
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.12.1

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  razorpay_flutter: ^1.4.0
  package_info_plus: ^8.3.0
  ota_update: ^7.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/ags_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/ags_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/ags_logo.png
